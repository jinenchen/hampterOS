<!DOCTYPE html> 
<html>
    <head>
        <title>hampterOS</title>
        <link rel="stylesheet" href="style.css">

    <body>
        <div class="os-window" id="char-select">
            <div class="window-header" id="char-selectheader">
                <span>hampter select</span>
                <span id="char-selectclose" style="cursor: pointer; color: red;">[X]</span>
            </div>
        
            <h1>select your hampter!</h1>

        </div>
        </div>
